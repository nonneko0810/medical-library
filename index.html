<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医学知識ライブラリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}

/* ══ THEMES ══ */
[data-theme="neon"]{
--bg:#0d0f1a;--bg2:#13162a;--bg3:#1a1e34;
--border:#ffffff18;--border2:#ffffff28;--border3:#ffffff40;
--text:#e8eaf6;--text2:#8b8fa8;--text3:#555870;
--title-color:#00d4c8;
--a1:#00d4c8;--a1b:#4df0e8;--a2:#c946a1;--a2b:#e040b0;
--a3:#7b5ea7;--a4:#f0a030;--danger:#f05060;
--card:var(--bg2);--banner-bg:#1a0a1a;--banner-border:#c946a140;
--banner-text:#f080a0;--chip-bg:#1e1030;--chip-border:#c946a150;--chip-text:#e0a0d0;
--sn-bg:#1e2030;--sn-t:var(--text3);--sn-b:var(--border);
--sr-bg:#001e1d;--sr-t:var(--a1);--sr-b:#00d4c840;
--sl-bg:#1e0a20;--sl-t:#d070e0;--sl-b:#c946a140;
--sm-bg:#0a1a0a;--sm-t:#50d090;--sm-b:#20b05040;
--star:#f0a030;--pbtn:var(--a2);--pbtn-t:#fff;
--ci1:#001e1d;--ci2:#1a0a18;--ci3:#120d20;--ci4:#1a1000;--ci5:#1a0a10;--ci6:#0a1a10;--ci7:#1a1a0a;--ci8:#0a0a1a;
}
[data-theme="pastel"]{
--bg:#1a1830;--bg2:#201e3a;--bg3:#272548;
--border:#ffffff1a;--border2:#ffffff2a;--border3:#ffffff40;
--text:#ede8ff;--text2:#9b96c0;--text3:#605c80;
--title-color:#d0c0ff;
--a1:#b8a0f0;--a1b:#d0c0ff;--a2:#f0a0c8;--a2b:#ffb8d8;
--a3:#f0c878;--a4:#a0d8f0;--danger:#f07080;
--card:var(--bg2);--banner-bg:#1e1428;--banner-border:#f0a0c840;
--banner-text:#f0b8d8;--chip-bg:#1a1228;--chip-border:#f0a0c850;--chip-text:#e8c0e0;
--sn-bg:#1e1c30;--sn-t:var(--text3);--sn-b:var(--border);
--sr-bg:#1a1830;--sr-t:var(--a1);--sr-b:#b8a0f040;
--sl-bg:#201628;--sl-t:var(--a2b);--sl-b:#f0a0c840;
--sm-bg:#1a1c20;--sm-t:#90e0b0;--sm-b:#60c09040;
--star:#f0c878;--pbtn:var(--a2);--pbtn-t:#1a1830;
--ci1:#14103a;--ci2:#1e1030;--ci3:#1e1808;--ci4:#0a1820;--ci5:#1e0820;--ci6:#081e10;--ci7:#1e1000;--ci8:#101820;
}
[data-theme="light"]{
--bg:#f5f4f0;--bg2:#ffffff;--bg3:#eceae6;
--border:#00000012;--border2:#00000022;--border3:#00000040;
--text:#1a1a2e;--text2:#5a5870;--text3:#9896a8;
--title-color:#1a1a2e;
--a1:#0070c0;--a1b:#0090e0;--a2:#c03080;--a2b:#e040a0;
--a3:#6040c0;--a4:#c07010;--danger:#d03040;
--card:#fff;--banner-bg:#fff5f0;--banner-border:#f0a08060;
--banner-text:#c05030;--chip-bg:#fff8f5;--chip-border:#f0a08060;--chip-text:#803020;
--sn-bg:#f0eeea;--sn-t:var(--text3);--sn-b:var(--border2);
--sr-bg:#e8f4ff;--sr-t:var(--a1);--sr-b:#0070c040;
--sl-bg:#fce8f4;--sl-t:var(--a2);--sl-b:#c0308040;
--sm-bg:#eaf5ee;--sm-t:#1a7a40;--sm-b:#40b06040;
--star:#c07010;--pbtn:var(--a2);--pbtn-t:#fff;
--ci1:#e8f4ff;--ci2:#fce8f4;--ci3:#ece8f8;--ci4:#fef6e0;--ci5:#fce8f0;--ci6:#eaf5ee;--ci7:#fef8e0;--ci8:#e8eeff;
}

html,body{height:100%}
body{background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s;position:relative}

/* ── Layout ── */
.app{max-width:960px;margin:0 auto;padding:1.25rem 1rem 3rem}

/* ── Theme bar ── */
.theme-bar{display:flex;align-items:center;gap:6px;margin-bottom:1.25rem}
.th-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-right:2px}
.tb{width:24px;height:24px;border-radius:7px;border:1.5px solid transparent;cursor:pointer;flex-shrink:0}
.tb:hover,.tb.on{border-color:var(--text2)}
.tb-neon{background:linear-gradient(135deg,#0d0f1a 50%,#c946a1 50%)}
.tb-pastel{background:linear-gradient(135deg,#1a1830 50%,#b8a0f0 50%)}
.tb-light{background:linear-gradient(135deg,#f5f4f0 50%,#0070c0 50%)}
.th-name{font-size:11px;color:var(--text3);margin-left:4px}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:36px;height:36px;border-radius:10px;border:1px solid var(--a2);display:flex;align-items:center;justify-content:center;background:var(--ci2);flex-shrink:0}
.brand-mark svg{width:17px;height:17px;stroke:var(--a2);fill:none;stroke-width:1.8;stroke-linecap:round}
.app-title{font-size:16px;font-weight:700;color:var(--title-color);letter-spacing:-.01em}
.app-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hdr-btns{display:flex;gap:7px}
.ghost-btn{font-size:11px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ghost-btn:hover{border-color:var(--a1);color:var(--a1)}
.ghost-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Review banner ── */
.review-wrap{border-radius:14px;padding:.9rem 1.1rem;margin-bottom:1.25rem;border:1px solid var(--banner-border);background:var(--banner-bg)}
.review-hdr{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--danger);flex-shrink:0}
.review-title{font-size:12px;font-weight:500;color:var(--banner-text);flex:1}
.overdue-tag{font-size:10px;color:var(--danger);font-weight:500;padding:2px 8px;border-radius:50px;border:1px solid var(--danger)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:50px;padding:4px 11px;color:var(--chip-text);cursor:pointer}
.chip:hover{border-color:var(--a2);color:var(--a2b)}
.chip-more{color:var(--text3);border-color:var(--border);border-style:dashed}
.no-review{font-size:12px;color:var(--text3)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:1.25rem}
.stat{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:13px 15px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.stat:hover{border-color:var(--border3)}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-.04em;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.s-track{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border)}
.s-fill{position:absolute;bottom:0;left:0;height:2px;border-radius:1px;transition:width .4s}

/* ── Stats detail modal ── */
.stat-detail-list{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto;padding-right:4px}
.stat-detail-list::-webkit-scrollbar{width:4px}
.stat-detail-list::-webkit-scrollbar-track{background:transparent}
.stat-detail-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.sd-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#f8f8f8;border-radius:10px;gap:10px;cursor:pointer}
.sd-row:hover{background:#ebebeb}
.sd-left{display:flex;flex-direction:column;gap:3px;min-width:0}
.sd-name{font-size:13px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-sec{font-size:11px;color:#888}
.sd-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sd-badge{font-size:10px;padding:2px 9px;border-radius:50px;font-weight:500;white-space:nowrap}
.sd-next{font-size:10px;color:#888;white-space:nowrap}
.sd-next-danger{font-size:10px;color:#c03030;font-weight:500;white-space:nowrap}
.sd-empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.sd-section-hdr{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;padding:8px 2px 4px;margin-top:4px}
.sd-chevron{color:#bbb;font-size:11px;flex-shrink:0}

/* アイテム詳細パネル */
.item-detail-panel{display:none;margin-top:4px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;overflow:hidden}
.item-detail-panel.open{display:block}
.idp-header{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0}
.idp-title{font-size:15px;font-weight:700;color:#111;margin-bottom:8px}
.idp-link{display:flex;align-items:center;gap:6px;font-size:12px;color:#0070c0;text-decoration:none;word-break:break-all}
.idp-link svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.idp-link:hover{text-decoration:underline}
.idp-no-link{font-size:12px;color:#bbb}
.idp-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.idp-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.idp-lbl{font-size:11px;color:#888;font-weight:500}
.idp-val{font-size:12px;color:#333;font-weight:500;text-align:right}
.idp-val-danger{font-size:12px;color:#c03030;font-weight:600;text-align:right}
.idp-val-ok{font-size:12px;color:#1a7a40;font-weight:500;text-align:right}
.idp-stars{display:flex;gap:2px}
.idp-star{font-size:14px;color:#ddd}
.idp-star.on{color:#f0a030}
.idp-actions{padding:10px 16px;border-top:1px solid #f0f0f0;display:flex;gap:8px}
.idp-study-btn{flex:1;padding:9px;border-radius:9px;border:1.5px solid #ddd;background:#f8f8f8;color:#444;font-size:13px;font-weight:500;cursor:pointer;text-align:center}
.idp-study-btn:hover{border-color:#1a1a2e;background:#1a1a2e;color:#fff}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;margin-bottom:1.1rem;background:var(--card);padding:3px;border-radius:9px;width:fit-content;border:1px solid var(--border)}
.tab{font-size:12px;padding:5px 15px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:6px}
.tab.on{background:var(--bg3);color:var(--text);font-weight:500;border:1px solid var(--border2)}

/* ── Search ── */
.search-wrap{margin-bottom:1rem;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;pointer-events:none}
#search-input{width:100%;padding:8px 12px 8px 32px;border-radius:9px;border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:12px;outline:none}
#search-input:focus{border-color:var(--a1)}
#search-input::placeholder{color:var(--text3)}

/* ── Category ── */
.cat-section{margin-bottom:7px;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.cat-hdr{display:flex;align-items:center;padding:10px 13px;cursor:pointer;background:var(--card);user-select:none;gap:9px}
.cat-hdr:hover{background:var(--bg3)}
.cat-ico{width:27px;height:27px;border-radius:8px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-ico svg{width:13px;height:13px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.cat-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.cat-meta{display:flex;align-items:center;gap:7px}
.cat-cnt{font-size:11px;color:var(--text3)}
.prog{height:3px;width:48px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;transition:width .4s}
.chev{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chev svg{width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;transition:transform .2s}
.chev.open svg{transform:rotate(180deg)}
.cat-body{display:none;padding:9px;background:var(--bg);border-top:1px solid var(--border)}
.cat-body.open{display:block}

/* ── Item grid ── */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:7px}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.item-card:hover{border-color:var(--border2)}
.item-card.untouched{opacity:.55}
.item-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.item-link-row{display:flex;align-items:center;gap:5px}
.item-link-row svg{width:11px;height:11px;stroke:var(--a1);fill:none;stroke-width:2;flex-shrink:0}
.item-link{font-size:11px;color:var(--a1);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.item-link:hover{color:var(--a1b)}
.item-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 9px;border-radius:50px;font-weight:500}
.b-none{background:var(--sn-bg);color:var(--sn-t);border:1px solid var(--sn-b)}
.b-read{background:var(--sr-bg);color:var(--sr-t);border:1px solid var(--sr-b)}
.b-learn{background:var(--sl-bg);color:var(--sl-t);border:1px solid var(--sl-b)}
.b-master{background:var(--sm-bg);color:var(--sm-t);border:1px solid var(--sm-b)}
.next-rv{font-size:10px;color:var(--text3)}
.overdue-lbl{font-size:10px;color:var(--danger);font-weight:500}
.item-actions{display:flex;align-items:center;gap:6px}
.study-btn{flex:1;font-size:11px;padding:5px 8px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.study-btn:hover{border-color:var(--a1);color:var(--a1)}
.study-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.stars{display:flex;gap:2px}
.star{font-size:13px;cursor:pointer;color:var(--border3);line-height:1}
.star.on{color:var(--star)}
.add-btn{width:100%;font-size:11px;padding:7px;border:1px dashed var(--border2);border-radius:8px;background:transparent;color:var(--text3);cursor:pointer;margin-top:5px;display:flex;align-items:center;justify-content:center;gap:4px}
.add-btn:hover{border-color:var(--border3);color:var(--text2)}
.add-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Edit mode ── */
body.edit-mode .item-card{position:relative}
.edit-actions{display:none;gap:4px;margin-top:4px}
body.edit-mode .edit-actions{display:flex}
.edit-del{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer}
.edit-del:hover{background:var(--danger);color:#fff}
.edit-url{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.edit-url:hover{border-color:var(--a1);color:var(--a1)}

/* セクション編集ボタン（編集モード時のみ表示） */
.sec-edit-btns{display:none;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
body.edit-mode .sec-edit-btns{display:flex}
.sec-btn{font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sec-btn:hover{border-color:var(--border3);color:var(--text)}
.sec-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.sec-btn-del{border-color:transparent;color:var(--text3)}
.sec-btn-del:hover{border-color:var(--danger);color:var(--danger);background:transparent}

/* セクション追加ボタン（各タブ末尾） */
.add-section-btn{width:100%;margin-top:10px;padding:10px;border:1.5px dashed var(--border2);border-radius:12px;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;gap:6px}
body.edit-mode .add-section-btn{display:flex}
.add-section-btn:hover{border-color:var(--a1);color:var(--a1)}
.add-section-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Inline link edit ── */
.item-link-row{position:relative}
.link-edit-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:5px;border:1px solid var(--border);
  background:transparent;cursor:pointer;flex-shrink:0;opacity:0;
  transition:opacity .15s,border-color .15s;vertical-align:middle;margin-left:4px;
}
.link-edit-btn svg{width:10px;height:10px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round}
.item-card:hover .link-edit-btn{opacity:1}
.link-edit-btn:hover{border-color:var(--a1);background:var(--sr-bg)}
.link-edit-btn:hover svg{stroke:var(--a1)}
.no-link-btn{
  font-size:10px;padding:3px 9px;border-radius:6px;border:1px dashed var(--border2);
  background:transparent;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;gap:4px;
}
.no-link-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}
.no-link-btn:hover{border-color:var(--a1);color:var(--a1)}

/* ── Modals ── */
.modal-wrap{display:none;position:absolute;left:0;right:0;top:0;z-index:500}
.modal-wrap.open{display:block}
.overlay{
  width:100%;
  min-height:100vh;
  background:rgba(0,0,0,.72);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:2.5rem 1rem;
}
.modal{
  background:#ffffff;
  border-radius:20px;
  padding:2rem;
  width:100%;
  max-width:460px;
  box-shadow:0 16px 56px rgba(0,0,0,.4);
}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:12px}
.modal-title{font-size:18px;font-weight:700;color:#111;line-height:1.3;flex:1}
.modal-close{width:34px;height:34px;border-radius:10px;border:1.5px solid #e0e0e0;background:#f5f5f5;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-close:hover{background:#eaeaea;color:#111}
.modal-close svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.m-lbl{font-size:13px;color:#444;margin-bottom:8px;font-weight:600;display:block}
.m-sec{margin-bottom:1.4rem}
.m-row{margin-bottom:1.1rem}
.stage-row{display:flex;gap:8px;flex-wrap:wrap}
.stage-opt{font-size:13px;padding:8px 18px;border-radius:50px;border:1.5px solid #ddd;background:#f8f8f8;color:#555;cursor:pointer;font-weight:500;transition:border-color .15s,color .15s,background .15s}
.stage-opt:hover{border-color:#aaa;color:#222;background:#f0f0f0}
.stage-opt.on{border-color:#1a1a2e;color:#fff;background:#1a1a2e;font-weight:600}
.stars-lg{display:flex;gap:12px;margin-top:8px}
.sl{font-size:34px;cursor:pointer;color:#ddd;line-height:1;transition:color .1s,transform .1s}
.sl:hover{transform:scale(1.2)}
.sl.on{color:#f0a030}
.score-hint{font-size:13px;color:#555;margin-top:12px;padding:11px 14px;background:#f4f4f4;border-radius:10px;border:1px solid #e8e8e8;line-height:1.5;font-weight:500}
.m-actions{display:flex;gap:10px;margin-top:1.5rem}
.btn-primary{flex:1;padding:13px;border-radius:11px;border:none;background:var(--pbtn);color:var(--pbtn-t);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-cancel{flex:1;padding:13px;border-radius:11px;border:1.5px solid #ddd;background:#f5f5f5;color:#555;font-size:15px;font-weight:500;cursor:pointer;transition:border-color .15s,color .15s}
.btn-cancel:hover{border-color:#999;color:#222;background:#eee}
.m-input{width:100%;padding:13px 14px;border-radius:11px;border:1.5px solid #ddd;background:#fafafa;color:#111;font-size:14px;outline:none;transition:border-color .15s;line-height:1.4}
.m-input:focus{border-color:var(--a1);background:#fff}
.m-input::placeholder{color:#bbb}
.m-divider{height:1px;background:#eee;margin:1.25rem 0}
.m-danger-btn{width:100%;padding:11px;border-radius:11px;border:1.5px solid #f5c0c0;background:#fff5f5;color:#c03030;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:border-color .15s,background .15s}
.m-danger-btn:hover{border-color:#e08080;background:#ffe8e8}
.m-danger-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Toast ── */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:12px;color:var(--text);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .tabs{flex-wrap:wrap}
  .hdr-btns{gap:5px}
  .ghost-btn span{display:none}
}
</style>

// ══════════════════════════════════════
//  SM-2 Algorithm
// ══════════════════════════════════════
function sm2(card, score) {
  // score: 1-5
  var s = score - 1; // 0-4 for SM-2
  var ef = card.ef || 2.5;
  var interval = card.interval || 0;
  var reps = card.reps || 0;

  if (s < 2) {
    reps = 0; interval = 1;
  } else {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * ef);
    reps++;
  }
  ef = Math.max(1.3, ef + 0.1 - (4 - s) * (0.08 + (4 - s) * 0.02));

  var nextDate = new Date();
  nextDate.setDate(nextDate.getDate() + interval);

  return {
    ef: Math.round(ef * 100) / 100,
    interval: interval,
    reps: reps,
    nextReview: nextDate.toISOString().slice(0, 10)
  };
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  var d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

var STORE_KEY = 'ml-data-v2';
var THEME_KEY = 'ml-theme';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { return {}; }
}
function saveData(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch(e) {}
}
function loadCustomItems() {
  try { return JSON.parse(localStorage.getItem('ml-custom')) || {}; } catch(e) { return {}; }
}
function saveCustomItems(d) {
  try { localStorage.setItem('ml-custom', JSON.stringify(d)); } catch(e) {}
}
function loadCustomSections() {
  try { return JSON.parse(localStorage.getItem('ml-custom-sections')) || {}; } catch(e) { return {}; }
}
function saveCustomSections(d) {
  try { localStorage.setItem('ml-custom-sections', JSON.stringify(d)); } catch(e) {}
}

var data = loadData();
var customItems = loadCustomItems();
var customSections = loadCustomSections(); // {secId: {name, tab, ...}}

// カスタムセクションをCATEGORIESに反映
Object.keys(customSections).forEach(function(secId) {
  var cs = customSections[secId];
  CATEGORIES.forEach(function(cat) {
    if (cat.tab === cs.tab) {
      if (!cat.sections.find(function(s){ return s.id === secId; })) {
        cat.sections.push({
          id: secId, name: cs.name,
          color: cs.color || '--a1', ci: cs.ci || 'ci1',
          icon: cs.icon || '<circle cx="12" cy="12" r="9"/>',
          items: []
        });
      }
    }
  });
});

// Merge custom items into CATEGORIES
Object.keys(customItems).forEach(function(secId) {
  customItems[secId].forEach(function(ci) {
    CATEGORIES.forEach(function(cat) {
      cat.sections.forEach(function(sec) {
        if (sec.id === secId) {
          if (!sec.items.find(function(i){ return i.slug === ci.slug; })) {
            sec.items.push(ci);
          }
        }
      });
    });
  });
});

function setTheme(t, btn) {
  document.getElementById('app').setAttribute('data-theme', t);
  document.getElementById('th-name').textContent = themeNames[t];
  document.querySelectorAll('.tb').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  try { localStorage.setItem(THEME_KEY, t); } catch(e) {}
}

  try {
    var saved = localStorage.getItem(THEME_KEY) || 'neon';
    var btn = document.querySelector('.tb-' + saved);
    setTheme(saved, btn);
  } catch(e) { setTheme('neon', document.querySelector('.tb-neon')); }
})();

//  Render
// ══════════════════════════════════════
function getAllItems() {
  var all = [];
  CATEGORIES.forEach(function(cat) {
    cat.sections.forEach(function(sec) {
      sec.items.forEach(function(item) {
        all.push({item:item, sec:sec, cat:cat});
      });
    });
  });
  return all;
}

function updateStats() {
  var all = getAllItems();
  var total = all.length;
  var studied = 0, master = 0, learn = 0, due = 0, overdue = 0;

  all.forEach(function(r) {
    var d = data[r.item.slug];
    if (!d) return;
    if (d.stage > 0) studied++;
    if (d.stage === 3) master++;
    if (d.stage === 2) learn++;
    if (d.nextReview) {
      var diff = daysUntil(d.nextReview);
      if (diff <= 0) { due++; if (diff < 0) overdue++; }
    }
  });

  function setText(id, val) {
    var el = document.getElementById(id);
    if (el) el.textContent = val;
  }
  function setWidth(id, val) {
    var el = document.getElementById(id);
    if (el) el.style.width = val;
  }

  setText('st-total', total);
  setText('st-cats', CATEGORIES.reduce(function(a,c){ return a + c.sections.length; }, 0) + '領域');
  setText('st-studied', studied);
  setText('st-studied-pct', Math.round(studied/total*100) + '%');
  setWidth('sf-studied', Math.round(studied/total*100) + '%');
  setText('st-master', master);
  setText('st-learn', '定着中 ' + learn + '件');
  setWidth('sf-master', Math.round(master/total*100) + '%');
  setText('st-due', due);
  setText('st-overdue', '期限超過 ' + overdue + '件');
  setWidth('sf-due', due > 0 ? '100%' : '0%');
  setText('hdr-sub', total + ' items · ' + studied + ' 件学習済み');

  // Review banner
  var dueItems = [];
  all.forEach(function(r) {
    var d = data[r.item.slug];
    if (d && d.nextReview) {
      var diff = daysUntil(d.nextReview);
      if (diff <= 0) dueItems.push({name: r.item.name, diff: diff, slug: r.item.slug});
    }
  });
  dueItems.sort(function(a,b){ return a.diff - b.diff; });

  var ot = document.getElementById('overdue-tag');
  var chips = document.getElementById('review-chips');
  if (ot) ot.textContent = overdue + '件 期限超過';
  if (chips) {
    if (dueItems.length === 0) {
      chips.innerHTML = '<span class="no-review">今日の復習はありません 🎉</span>';
    } else {
      var shown = dueItems.slice(0, 4);
      var extra = dueItems.length - shown.length;
      chips.innerHTML = shown.map(function(it) {
        return '<span class="chip" onclick="openStudyModal(\'' + it.slug.replace(/'/g,"\\'") + '\',\'' + it.name.replace(/'/g,"\\'") + '\')">' + it.name + '</span>';
      }).join('') + (extra > 0 ? '<span class="chip chip-more">+ ' + extra + '件</span>' : '');
    }
  }
}

function stageLabel(s) {
  return ['未着手','一読','定着中','マスター'][s] || '未着手';
}
function stageCls(s) {
  return ['b-none','b-read','b-learn','b-master'][s] || 'b-none';
}
function renderStars(slug) {
  var d = data[slug];
  var score = d ? (d.lastScore || 0) : 0;
  var html = '<div class="stars">';
  for (var i = 1; i <= 5; i++) {
    html += '<span class="star' + (i <= score ? ' on' : '') + '" onclick="quickScore(\'' + slug + '\',' + i + ')">★</span>';
  }
  return html + '</div>';
}

function renderItem(item, sec) {
  var d = data[item.slug] || {};
  var stage = d.stage || 0;
  var untouched = stage === 0 && !d.nextReview;
  var diff = d.nextReview ? daysUntil(d.nextReview) : null;
  var isOverdue = diff !== null && diff < 0;
  var isDue = diff !== null && diff === 0;

  var nextText = '';
  if (isOverdue) nextText = '<span class="overdue-lbl">' + Math.abs(diff) + '日超過</span>';
  else if (isDue) nextText = '<span class="overdue-lbl">今日期限</span>';
  else if (diff !== null) nextText = '<span class="next-rv">次回: ' + diff + '日後</span>';

  var editPencil = '<button class="link-edit-btn" title="リンクを編集" onclick="event.stopPropagation();openUrlModal(\'' + item.slug.replace(/'/g,"\\'") + '\')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
  var linkRow = item.url
    ? '<div class="item-link-row"><svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:var(--a1);fill:none;stroke-width:2;flex-shrink:0"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><a class="item-link" href="' + item.url + '" target="_blank" rel="noopener">' + (item.linkName || item.url) + '</a>' + editPencil + '</div>'
    : '<div class="item-link-row"><button class="no-link-btn" onclick="openUrlModal(\'' + item.slug.replace(/'/g,"\\'") + '\')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>リンクを追加</button></div>';

  var studyBtnLabel = stage > 0 ? '復習した' : '学習した';
  var studyBtnIcon = stage > 0
    ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';

  var editRow = '<div class="edit-actions"><button class="edit-url" onclick="openUrlModal(\'' + item.slug.replace(/'/g,"\\'") + '\')">URLを変更</button><button class="edit-del" onclick="deleteItem(\'' + item.slug.replace(/'/g,"\\'") + '\',\'' + sec.id + '\')">削除</button></div>';

  return '<div class="item-card' + (untouched ? ' untouched' : '') + '" id="card-' + item.slug + '">'
    + '<span class="item-name">' + item.name + '</span>'
    + linkRow
    + '<div class="item-foot"><span class="badge ' + stageCls(stage) + '">' + stageLabel(stage) + '</span>' + nextText + '</div>'
    + '<div class="item-actions"><button class="study-btn" onclick="openStudyModal(\'' + item.slug.replace(/'/g,"\\'") + '\',\'' + item.name.replace(/'/g,"\\'") + '\')">' + studyBtnIcon + studyBtnLabel + '</button>' + renderStars(item.slug) + '</div>'
    + editRow
    + '</div>';
}

function renderSection(sec, searchQ) {
  var items = sec.items;
  if (searchQ) {
    items = items.filter(function(it) {
      return it.name.toLowerCase().indexOf(searchQ) >= 0 || (it.linkName || '').toLowerCase().indexOf(searchQ) >= 0;
    });
  }
  if (searchQ && items.length === 0) return '';

  var studied = items.filter(function(it){ var d = data[it.slug]; return d && d.stage > 0; }).length;
  var pct = items.length > 0 ? Math.round(studied / items.length * 100) : 0;

  var itemsHtml = items.map(function(it){ return renderItem(it, sec); }).join('');
  var addBtn = '<button class="add-btn" onclick="openAddModal(\'' + sec.id + '\')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>項目を追加</button>';

  // カテゴリヘッダーは常に表示。中身は学習済み・期限超過がある場合のみ自動展開
  var bodyOpen = searchQ || studied > 0 || items.some(function(it){ var d = data[it.slug]; return d && d.nextReview && daysUntil(d.nextReview) <= 0; });
  var chevOpen = bodyOpen ? ' open' : '';

  var isCustomSec = !!customSections[sec.id];
  var secEditBtns = '<div class="sec-edit-btns" onclick="event.stopPropagation()">'
    + '<button class="sec-btn" onclick="openSecEditModal(\'' + sec.id.replace(/'/g,"\\'") + '\')"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>名前変更</button>'
    + '<button class="sec-btn sec-btn-del" onclick="deleteSection(\'' + sec.id.replace(/'/g,"\\'") + '\',\'' + sec.name.replace(/'/g,"\\'") + '\')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>削除</button>'
    + '</div>';

  return '<div class="cat-section" id="sec-' + sec.id + '">'
    + '<div class="cat-hdr" onclick="toggleCat(this)">'
    + '<div class="cat-ico" style="background:var(' + sec.ci + ')"><svg viewBox="0 0 24 24" style="stroke:var(' + sec.color + ')">' + sec.icon + '</svg></div>'
    + '<span class="cat-name">' + sec.name + '</span>'
    + '<div class="cat-meta"><div class="prog"><div class="prog-f" style="width:' + pct + '%;background:var(' + sec.color + ')"></div></div><span class="cat-cnt">' + studied + ' / ' + items.length + '</span></div>'
    + secEditBtns
    + '<div class="chev' + chevOpen + '"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>'
    + '</div>'
    + '<div class="cat-body' + (bodyOpen ? ' open' : '') + '">'
    + '<div class="item-grid">' + itemsHtml + '</div>'
    + addBtn
    + '</div>'
    + '</div>';
}

function renderAll() {
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  var html = '';

  CATEGORIES.forEach(function(cat) {
    if (currentTab !== 'all' && cat.tab !== currentTab) return;
    cat.sections.forEach(function(sec) {
      html += renderSection(sec, q);
    });
  });

  if (!html) html = '<div style="text-align:center;padding:3rem;color:var(--text3);font-size:13px">該当するアイテムが見つかりませんでした</div>';

  // セクション追加ボタン（編集モード時のみ表示）
  html += '<button class="add-section-btn" onclick="openSecAddModal(\'' + currentTab + '\')">'
    + '<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    + 'カテゴリを追加'
    + '</button>';

  var mc = document.getElementById('main-content');
  if (mc) mc.innerHTML = html;
}

// ══════════════════════════════════════
//  Interactions
// ══════════════════════════════════════
function toggleCat(hdr) {
  var chev = hdr.querySelector('.chev');
  var body = hdr.nextElementSibling;
  var open = body.classList.contains('open');
  body.classList.toggle('open', !open);
  chev.classList.toggle('open', !open);
}

function switchTab(t, btn) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  renderAll();
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('edit-btn').style.borderColor = editMode ? 'var(--a1)' : '';
  document.getElementById('edit-btn').style.color = editMode ? 'var(--a1)' : '';
  document.querySelector('#edit-btn span').textContent = editMode ? '編集中...' : '編集モード';
  showToast(editMode ? '編集モード ON — 削除・URL変更が可能です' : '編集モード OFF');
}

// モーダルを開いた時点の開閉状態を保存
var savedOpenSecs = [];

// Study modal
function openStudyModal(slug, name) {
  studyTarget = slug;
  sm_score = 3; sm_stage = 1;
  var d = data[slug] || {};
  sm_stage = d.stage || 0;
  document.getElementById('sm-title').textContent = '記録: ' + name;
  document.querySelectorAll('.stage-opt').forEach(function(b, i){ b.classList.toggle('on', i === sm_stage); });
  selScore(d.lastScore || 3);

  // この時点で開いているカテゴリを記憶（モーダルを開く前）
  savedOpenSecs = [];
  document.querySelectorAll('#main-content .cat-section').forEach(function(el) {
    if (el.querySelector('.cat-body.open')) savedOpenSecs.push(el.id);
  });

  openModalById('study-modal');
}

function selStage(i) {
  sm_stage = i;
  document.querySelectorAll('.stage-opt').forEach(function(b, j){ b.classList.toggle('on', j === i); });
}

var hintTexts = ['1/5 → 翌日に再復習','2/5 → 翌日に再復習','3/5 → 次回: 約6日後','4/5 → 次回: 約10日後','5/5 → 次回: 約14日後'];
function selScore(n) {
  sm_score = n;
  var hint = document.getElementById('sm-hint');
  if (hint) hint.textContent = hintTexts[n - 1];
  document.querySelectorAll('#sm-stars .sl').forEach(function(s, j){ s.classList.toggle('on', j < n); });
}

// 開閉状態を復元してrenderAll
function renderAllAndRestore(openSecs) {
  updateStats();
  renderAll();
  // renderAll後にDOMが確実に存在するタイミングで復元
  openSecs.forEach(function(secId) {
    var secEl = document.getElementById(secId);
    if (secEl) {
      var body = secEl.querySelector('.cat-body');
      var chev = secEl.querySelector('.chev');
      if (body) body.classList.add('open');
      if (chev) chev.classList.add('open');
    }
  });
}

function saveStudy() {
  if (!studyTarget) return;

  var old = data[studyTarget] || { ef: 2.5, interval: 0, reps: 0 };
  var result = sm2(old, sm_score);
  data[studyTarget] = {
    ef: result.ef,
    interval: result.interval,
    reps: result.reps,
    nextReview: result.nextReview,
    stage: sm_stage,
    lastScore: sm_score,
    lastStudied: new Date().toISOString().slice(0, 10)
  };
  saveData(data);
  closeModal('study-modal');
  showToast('記録しました！次回: ' + data[studyTarget].nextReview);
  renderAllAndRestore(savedOpenSecs);
}

// Quick star rating
function quickScore(slug, score) {
  var old = data[slug] || { ef: 2.5, interval: 0, reps: 0, stage: 0 };
  var result = sm2(old, score);
  data[slug] = {
    ef: result.ef,
    interval: result.interval,
    reps: result.reps,
    nextReview: result.nextReview,
    lastScore: score,
    stage: Math.max(old.stage || 0, 1),
    lastStudied: new Date().toISOString().slice(0, 10)
  };
  saveData(data);

  // 現時点の開閉状態を記憶して再描画
  var openSecs = [];
  document.querySelectorAll('#main-content .cat-section').forEach(function(el) {
    if (el.querySelector('.cat-body.open')) openSecs.push(el.id);
  });
  showToast('理解度 ' + score + '/5 で記録しました');
  renderAllAndRestore(openSecs);
}

// Add item
function openAddModal(secId) {
  addTargetSec = secId;
  document.getElementById('add-name').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('add-link-name').value = '';
  openModalById('add-modal');
}

function saveAdd() {
  var name = document.getElementById('add-name').value.trim();
  if (!name) { showToast('疾患名を入力してください'); return; }
  var url = document.getElementById('add-url').value.trim();
  var linkName = document.getElementById('add-link-name').value.trim() || name;
  var slug = 'custom-' + addTargetSec + '-' + Date.now();

  var newItem = { slug: slug, name: name, url: url || null, linkName: linkName };

  // Add to CATEGORIES
  CATEGORIES.forEach(function(cat) {
    cat.sections.forEach(function(sec) {
      if (sec.id === addTargetSec) sec.items.push(newItem);
    });
  });

  // Persist
  if (!customItems[addTargetSec]) customItems[addTargetSec] = [];
  customItems[addTargetSec].push(newItem);
  saveCustomItems(customItems);

  closeModal('add-modal');
  showToast('「' + name + '」を追加しました');
  updateStats();
  renderAll();
}

// ── Section CRUD ──
var secEditTargetId = null;
var secAddTargetTab = null;

function openSecAddModal(tab) {
  secAddTargetTab = tab;
  document.getElementById('sec-add-name').value = '';
  openModalById('sec-add-modal');
}

function saveSecAdd() {
  var name = document.getElementById('sec-add-name').value.trim();
  if (!name) { showToast('カテゴリ名を入力してください'); return; }
  var secId = 'custom-sec-' + Date.now();
  var colors = ['--a1','--a2b','--a3','--a4'];
  var cis = ['ci1','ci2','ci3','ci4'];
  var idx = Object.keys(customSections).length % 4;
  var newSec = { id: secId, name: name, tab: secAddTargetTab, color: colors[idx], ci: cis[idx], icon: '<circle cx="12" cy="12" r="9"/>', items: [] };
  CATEGORIES.forEach(function(cat) {
    if (cat.tab === secAddTargetTab) cat.sections.push(Object.assign({}, newSec));
  });
  customSections[secId] = { name: name, tab: secAddTargetTab, color: newSec.color, ci: newSec.ci, icon: newSec.icon };
  saveCustomSections(customSections);
  closeModal('sec-add-modal');
  showToast('「' + name + '」カテゴリを追加しました');
  renderAll(); updateStats();
}

function openSecEditModal(secId) {
  secEditTargetId = secId;
  var sec = null;
  CATEGORIES.forEach(function(cat){ cat.sections.forEach(function(s){ if(s.id===secId) sec=s; }); });
  document.getElementById('sec-edit-name').value = sec ? sec.name : '';
  openModalById('sec-edit-modal');
}

function saveSecEdit() {
  var name = document.getElementById('sec-edit-name').value.trim();
  if (!name) { showToast('カテゴリ名を入力してください'); return; }
  CATEGORIES.forEach(function(cat){ cat.sections.forEach(function(s){ if(s.id===secEditTargetId) s.name=name; }); });
  if (customSections[secEditTargetId]) {
    customSections[secEditTargetId].name = name;
    saveCustomSections(customSections);
  }
  closeModal('sec-edit-modal');
  showToast('カテゴリ名を変更しました');
  renderAll();
}

function deleteSection(secId, secName) {
  var sec = null;
  CATEGORIES.forEach(function(cat){ cat.sections.forEach(function(s){ if(s.id===secId) sec=s; }); });
  var itemCount = sec ? sec.items.length : 0;
  var msg = '「' + secName + '」を削除しますか？' + (itemCount > 0 ? '\n（この中の' + itemCount + '件の項目と学習データもすべて削除されます）' : '');
  if (!confirm(msg)) return;
  if (sec) {
    sec.items.forEach(function(it){ delete data[it.slug]; });
    saveData(data);
    if (customItems[secId]) { delete customItems[secId]; saveCustomItems(customItems); }
  }
  CATEGORIES.forEach(function(cat){ cat.sections = cat.sections.filter(function(s){ return s.id !== secId; }); });
  if (customSections[secId]) { delete customSections[secId]; saveCustomSections(customSections); }
  showToast('「' + secName + '」を削除しました');
  renderAll(); updateStats();
}

// Delete item
function deleteItem(slug, secId) {
  if (!confirm('「' + slug + '」を削除しますか？')) return;
  CATEGORIES.forEach(function(cat) {
    cat.sections.forEach(function(sec) {
      sec.items = sec.items.filter(function(it){ return it.slug !== slug; });
    });
  });
  if (customItems[secId]) {
    customItems[secId] = customItems[secId].filter(function(it){ return it.slug !== slug; });
    saveCustomItems(customItems);
  }
  delete data[slug]; saveData(data);
  showToast('削除しました');
  updateStats();
  renderAll();
}

// URL edit
function openUrlModal(slug) {
  urlTargetSlug = slug;
  var item = null;
  CATEGORIES.forEach(function(cat){ cat.sections.forEach(function(sec){ sec.items.forEach(function(it){ if(it.slug===slug) item=it; }); }); });
  document.getElementById('url-modal-title').textContent = (item ? item.name : 'リンク') + ' — リンクを編集';
  document.getElementById('url-input').value = item ? (item.url || '') : '';
  document.getElementById('url-name-input').value = item ? (item.linkName || '') : '';
  openModalById('url-modal');
}

function _applyUrlChange(url, linkName) {
  CATEGORIES.forEach(function(cat){ cat.sections.forEach(function(sec){ sec.items.forEach(function(it){
    if (it.slug === urlTargetSlug) {
      it.url = url || null;
      it.linkName = linkName || it.name;
    }
  }); }); });
  Object.keys(customItems).forEach(function(k){ customItems[k].forEach(function(it){
    if (it.slug === urlTargetSlug) { it.url = url || null; if (linkName) it.linkName = linkName; }
  }); });
  saveCustomItems(customItems);
}

function saveUrl() {
  var url = document.getElementById('url-input').value.trim();
  var linkName = document.getElementById('url-name-input').value.trim();
  _applyUrlChange(url, linkName);
  closeModal('url-modal');
  showToast(url ? 'リンクを更新しました（学習データは保持されています）' : 'リンクを削除しました');
  renderAll();
}

function clearUrl() {
  if (!confirm('リンクを削除してURLなしにしますか？\n学習データは保持されます。')) return;
  _applyUrlChange('', '');
  closeModal('url-modal');
  showToast('リンクを削除しました');
  renderAll();
}

// ── 統計詳細モーダル ──
function makeRow(r, extraRight) {
  var slug = r.item.slug.replace(/'/g,"\\'");
  var d = data[r.item.slug] || {};
  var stage = d.stage || 0;
  var cls = ['b-none','b-read','b-learn','b-master'][stage] || 'b-none';
  var badge = '<span class="sd-badge ' + cls + '">' + stageLabel(stage) + '</span>';
  return '<div class="sd-item-wrap" id="sdw-' + r.item.slug + '">'
    + '<div class="sd-row" onclick="toggleItemDetail(this,\'' + slug + '\')">'
    + '<div class="sd-left"><span class="sd-name">' + r.item.name + '</span><span class="sd-sec">' + r.sec.name + '</span></div>'
    + '<div class="sd-right">' + badge + (extraRight || '') + '<span class="sd-chevron">›</span></div>'
    + '</div>'
    + '<div class="item-detail-panel" id="idp-' + r.item.slug + '"></div>'
    + '</div>';
}

function toggleItemDetail(rowEl, slug) {
  var panel = document.getElementById('idp-' + slug);
  if (!panel) return;
  var isOpen = panel.classList.contains('open');
  // 全パネルを閉じる
  document.querySelectorAll('.item-detail-panel.open').forEach(function(p) {
    p.classList.remove('open');
  });
  if (isOpen) return; // 同じ行を再クリックで閉じる

  // アイテム情報を取得
  var item = null; var sec = null;
  CATEGORIES.forEach(function(cat){ cat.sections.forEach(function(s){ s.items.forEach(function(it){ if(it.slug===slug){item=it;sec=s;} }); }); });
  if (!item) return;

  var d = data[slug] || {};
  var stage = d.stage || 0;
  var diff = d.nextReview ? daysUntil(d.nextReview) : null;
  var starsHtml = '<div class="idp-stars">';
  for (var i=1;i<=5;i++) starsHtml += '<span class="idp-star' + (i<=(d.lastScore||0)?' on':'') + '">★</span>';
  starsHtml += '</div>';

  var nextValHtml = diff === null
    ? '<span class="idp-val">未記録</span>'
    : diff < 0 ? '<span class="idp-val-danger">' + Math.abs(diff) + '日超過</span>'
    : diff === 0 ? '<span class="idp-val-danger">今日期限</span>'
    : '<span class="idp-val-ok">'+diff+'日後</span>';

  var linkHtml = item.url
    ? '<a class="idp-link" href="' + item.url + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' + (item.linkName || item.url) + '</a>'
    : '<span class="idp-no-link">リンクなし</span>';

  var cls = ['b-none','b-read','b-learn','b-master'][stage] || 'b-none';

  panel.innerHTML =
    '<div class="idp-header">'
    + '<div class="idp-title">' + item.name + '</div>'
    + linkHtml
    + '</div>'
    + '<div class="idp-body">'
    + '<div class="idp-row"><span class="idp-lbl">習熟段階</span><span class="sd-badge ' + cls + '" style="font-size:11px">' + stageLabel(stage) + '</span></div>'
    + '<div class="idp-row"><span class="idp-lbl">理解度</span>' + starsHtml + '</div>'
    + '<div class="idp-row"><span class="idp-lbl">次回復習</span>' + nextValHtml + '</div>'
    + '<div class="idp-row"><span class="idp-lbl">最終学習</span><span class="idp-val">' + (d.lastStudied || '未記録') + '</span></div>'
    + '<div class="idp-row"><span class="idp-lbl">カテゴリ</span><span class="idp-val">' + sec.name + '</span></div>'
    + '</div>'
    + '<div class="idp-actions">'
    + '<button class="idp-study-btn" onclick="event.stopPropagation();closeModal(\'stat-detail-modal\');openStudyModal(\'' + slug.replace(/'/g,"\\'") + '\',\'' + item.name.replace(/'/g,"\\'") + '\')">'
    + (stage > 0 ? '復習を記録する' : '学習を記録する')
    + '</button>'
    + '</div>';

  panel.classList.add('open');
}

function openStatDetail(type) {
  var all = getAllItems();
  var title = '';
  var rows = [];

  if (type === 'total') {
    title = '全アイテム一覧（' + all.length + '件）';
    var bySec = {};
    all.forEach(function(r) {
      if (!bySec[r.sec.name]) bySec[r.sec.name] = [];
      bySec[r.sec.name].push(r);
    });
    Object.keys(bySec).forEach(function(secName) {
      rows.push('<div class="sd-section-hdr">' + secName + '</div>');
      bySec[secName].forEach(function(r) { rows.push(makeRow(r, '')); });
    });

  } else if (type === 'studied') {
    var studied = all.filter(function(r){ var d=data[r.item.slug]; return d && d.stage > 0; });
    title = '学習済みアイテム（' + studied.length + '件）';
    if (studied.length === 0) {
      rows.push('<div class="sd-empty">まだ学習済みのアイテムはありません</div>');
    } else {
      studied.forEach(function(r) {
        var d = data[r.item.slug];
        var diff = d.nextReview ? daysUntil(d.nextReview) : null;
        var nextHtml = diff === null ? '' : diff < 0
          ? '<span class="sd-next-danger">' + Math.abs(diff) + '日超過</span>'
          : diff === 0 ? '<span class="sd-next-danger">今日期限</span>'
          : '<span class="sd-next">次回 ' + diff + '日後</span>';
        rows.push(makeRow(r, nextHtml));
      });
    }

  } else if (type === 'master') {
    var mastered = all.filter(function(r){ var d=data[r.item.slug]; return d && d.stage === 3; });
    var learning = all.filter(function(r){ var d=data[r.item.slug]; return d && d.stage === 2; });
    title = 'マスター ' + mastered.length + '件 · 定着中 ' + learning.length + '件';
    if (mastered.length === 0 && learning.length === 0) {
      rows.push('<div class="sd-empty">マスター・定着中のアイテムはまだありません</div>');
    } else {
      if (mastered.length > 0) {
        rows.push('<div class="sd-section-hdr">マスター</div>');
        mastered.forEach(function(r) {
          var d = data[r.item.slug];
          var nextHtml = d.nextReview ? '<span class="sd-next">次回 ' + daysUntil(d.nextReview) + '日後</span>' : '';
          rows.push(makeRow(r, nextHtml));
        });
      }
      if (learning.length > 0) {
        rows.push('<div class="sd-section-hdr">定着中</div>');
        learning.forEach(function(r) {
          var d = data[r.item.slug];
          var nextHtml = d.nextReview ? '<span class="sd-next">次回 ' + daysUntil(d.nextReview) + '日後</span>' : '';
          rows.push(makeRow(r, nextHtml));
        });
      }
    }

  } else if (type === 'due') {
    var overdueItems = all.filter(function(r){ var d=data[r.item.slug]; return d && d.nextReview && daysUntil(d.nextReview) < 0; });
    var todayItems = all.filter(function(r){ var d=data[r.item.slug]; return d && d.nextReview && daysUntil(d.nextReview) === 0; });
    title = '今日の復習（' + (overdueItems.length + todayItems.length) + '件）';
    if (overdueItems.length === 0 && todayItems.length === 0) {
      rows.push('<div class="sd-empty">今日の復習はありません 🎉</div>');
    } else {
      if (overdueItems.length > 0) {
        rows.push('<div class="sd-section-hdr">期限超過</div>');
        overdueItems.sort(function(a,b){ return daysUntil(data[a.item.slug].nextReview) - daysUntil(data[b.item.slug].nextReview); });
        overdueItems.forEach(function(r) {
          var diff = daysUntil(data[r.item.slug].nextReview);
          rows.push(makeRow(r, '<span class="sd-next-danger">' + Math.abs(diff) + '日超過</span>'));
        });
      }
      if (todayItems.length > 0) {
        rows.push('<div class="sd-section-hdr">本日期限</div>');
        todayItems.forEach(function(r) { rows.push(makeRow(r, '<span class="sd-next-danger">今日期限</span>')); });
      }
    }
  }

  var titleEl = document.getElementById('stat-detail-title');
  var bodyEl = document.getElementById('stat-detail-body');
  if (titleEl) titleEl.textContent = title;
  if (bodyEl) bodyEl.innerHTML = '<div class="stat-detail-list">' + rows.join('') + '</div>';
  openModalById('stat-detail-modal');
}
function exportData() {
  var out = { exportedAt: new Date().toISOString(), studyData: data, customItems: customItems };
  var blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'medical-library-export-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('エクスポートしました');
}

// Modal helpers
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function openModalById(id) {
  ['study-modal','add-modal','url-modal','sec-add-modal','sec-edit-modal','stat-detail-modal'].forEach(function(mid){
    if (mid !== id) document.getElementById(mid).classList.remove('open');
  });
  var el = document.getElementById(id);
  el.style.top = (window.scrollY || document.documentElement.scrollTop) + 'px';
  el.classList.add('open');
}

// Toast
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ══════════════════════════════════════
//  Init
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  var areaTab = document.querySelector('.tab');
  switchTab('area', areaTab);
  updateStats();
});
</script>

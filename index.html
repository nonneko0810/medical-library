<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医学知識ライブラリ</title>
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>
<div class="app" id="app">

<!-- Theme bar -->
<div class="theme-bar">
  <span class="th-label">テーマ</span>
  <button class="tb tb-neon on" onclick="setTheme('neon',this)" title="Neon dark"></button>
  <button class="tb tb-pastel" onclick="setTheme('pastel',this)" title="Pastel dark"></button>
  <button class="tb tb-light" onclick="setTheme('light',this)" title="Light"></button>
  <span class="th-name" id="th-name">Neon dark</span>
</div>

<!-- Header -->
<div class="hdr">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 15.5"/></svg>
    </div>
    <div>
      <div class="app-title">医学知識ライブラリ</div>
      <div class="app-sub" id="hdr-sub">読み込み中...</div>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="ghost-btn" onclick="exportData()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>エクスポート</span>
    </button>
    <!-- 編集モードボタン（管理者ログイン時のみ表示） -->
    <button class="ghost-btn" id="edit-btn" onclick="toggleEdit()" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>編集モード</span>
    </button>
    <!-- ログアウトボタン（管理者ログイン時のみ表示） -->
    <button class="ghost-btn" id="logout-btn" onclick="doLogout()" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>ログアウト</span>
    </button>
    <!-- ログインボタン（未ログイン時のみ表示） -->
    <button class="ghost-btn" id="login-btn" onclick="openLoginModal()">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span>ログイン</span>
    </button>
  </div>
</div>

<!-- Review banner -->
<div class="review-wrap">
  <div class="review-hdr">
    <div class="pulse"></div>
    <span class="review-title">今日の復習リスト</span>
    <span class="overdue-tag" id="overdue-count">0件</span>
  </div>
  <div class="chips" id="review-chips"><span class="no-review">今日の復習はありません 🎉</span></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat" onclick="openStatDetail('total')">
    <div class="stat-lbl">総アイテム</div>
    <div class="stat-val" id="st-total" style="color:var(--text)">0</div>
    <div class="stat-sub" id="st-cats">0領域</div>
    <div class="s-track"></div>
  </div>
  <div class="stat" onclick="openStatDetail('studied')">
    <div class="stat-lbl">学習済み</div>
    <div class="stat-val" id="st-studied" style="color:var(--a1)">0</div>
    <div class="stat-sub" id="st-studied-pct">0%</div>
    <div class="s-track"></div>
    <div class="s-fill" id="sf-studied" style="background:var(--a1);width:0%"></div>
  </div>
  <div class="stat" onclick="openStatDetail('master')">
    <div class="stat-lbl">マスター</div>
    <div class="stat-val" id="st-master" style="color:var(--a2b)">0</div>
    <div class="stat-sub" id="st-learn">定着中 0件</div>
    <div class="s-track"></div>
    <div class="s-fill" id="sf-master" style="background:var(--a2b);width:0%"></div>
  </div>
  <div class="stat" onclick="openStatDetail('due')">
    <div class="stat-lbl">今日の復習</div>
    <div class="stat-val" id="st-due" style="color:var(--danger)">0</div>
    <div class="stat-sub" id="st-overdue">期限超過 0件</div>
    <div class="s-track"></div>
    <div class="s-fill" id="sf-due" style="background:var(--danger);width:0%"></div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-row">
  <div class="tabs">
    <button class="tab on" onclick="switchTab('area',this)">領域別</button>
    <button class="tab" onclick="switchTab('cross',this)">横断テーマ</button>
    <button class="tab" onclick="switchTab('exam',this)">検査</button>
    <button class="tab" onclick="switchTab('all',this)">全て</button>
  </div>
  <button class="ghost-btn" onclick="closeAllCats()">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    <span>全て閉じる</span>
  </button>
</div>

<!-- Search -->
<div class="search-wrap">
  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="search-input" placeholder="疾患名・キーワードで検索..." oninput="renderAll()">
</div>

<!-- Section quick-jump nav -->
<div id="section-nav" class="section-nav"></div>

<!-- Main content -->
<div id="main-content"><div class="loading-msg">読み込み中...</div></div>

</div><!-- /app -->

<!-- ══ モーダル群 ══ -->

<!-- 学習記録モーダル -->
<div class="modal-wrap" id="study-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('study-modal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="sm-title">学習を記録</div>
        <button class="modal-close" onclick="closeModal('study-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="m-sec">
        <label class="m-lbl">習熟段階</label>
        <div class="stage-row">
          <button class="stage-opt" onclick="selStage(0)">未着手</button>
          <button class="stage-opt" onclick="selStage(1)">一読</button>
          <button class="stage-opt" onclick="selStage(2)">定着中</button>
          <button class="stage-opt" onclick="selStage(3)">マスター</button>
        </div>
      </div>
      <div class="m-sec">
        <label class="m-lbl">理解度（SM-2スコア）</label>
        <div class="stars-lg" id="sm-stars">
          <span class="sl" onclick="selScore(1)">★</span>
          <span class="sl" onclick="selScore(2)">★</span>
          <span class="sl" onclick="selScore(3)">★</span>
          <span class="sl" onclick="selScore(4)">★</span>
          <span class="sl" onclick="selScore(5)">★</span>
        </div>
        <div class="score-hint" id="sm-hint">スコアを選択してください</div>
      </div>
      <div class="m-actions">
        <button class="btn-cancel" onclick="closeModal('study-modal')">キャンセル</button>
        <button class="btn-primary" onclick="saveStudy()">記録する</button>
      </div>
    </div>
  </div>
</div>

<!-- 項目追加モーダル -->
<div class="modal-wrap" id="add-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('add-modal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">項目を追加</div>
        <button class="modal-close" onclick="closeModal('add-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="m-row">
        <label class="m-lbl">疾患名・タイトル <span style="color:#e03">*</span></label>
        <input class="m-input" id="add-name" placeholder="例: 急性骨髄性白血病">
      </div>
      <div class="m-row">
        <label class="m-lbl">リンクURL（任意）</label>
        <input class="m-input" id="add-url" placeholder="https://...">
      </div>
      <div class="m-row">
        <label class="m-lbl">リンク表示名（任意）</label>
        <input class="m-input" id="add-link-name" placeholder="例: aml_pathology.html">
      </div>
      <div class="m-actions">
        <button class="btn-cancel" onclick="closeModal('add-modal')">キャンセル</button>
        <button class="btn-primary" onclick="saveAdd()">追加する</button>
      </div>
    </div>
  </div>
</div>

<!-- リンク編集モーダル -->
<div class="modal-wrap" id="url-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('url-modal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="url-modal-title">リンクを編集</div>
        <button class="modal-close" onclick="closeModal('url-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="m-row">
        <label class="m-lbl">表示名</label>
        <input class="m-input" id="url-name-input" placeholder="例: melanoma_overview_japanese.html">
      </div>
      <div class="m-row">
        <label class="m-lbl">URL</label>
        <input class="m-input" id="url-input" placeholder="https://...">
      </div>
      <div class="m-actions">
        <button class="btn-cancel" onclick="closeModal('url-modal')">キャンセル</button>
        <button class="btn-primary" onclick="saveUrl()">保存する</button>
      </div>
      <div class="m-divider"></div>
      <button class="m-danger-btn" onclick="clearUrl()">
        <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        リンクを削除してURLなしにする
      </button>
    </div>
  </div>
</div>

<!-- 統計詳細モーダル -->
<div class="modal-wrap" id="stat-detail-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('stat-detail-modal')">
    <div class="modal" style="max-width:520px">
      <div class="modal-header">
        <div class="modal-title" id="stat-detail-title">詳細</div>
        <button class="modal-close" onclick="closeModal('stat-detail-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="stat-detail-body"></div>
    </div>
  </div>
</div>

<!-- カテゴリ追加モーダル -->
<div class="modal-wrap" id="sec-add-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('sec-add-modal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">カテゴリを追加</div>
        <button class="modal-close" onclick="closeModal('sec-add-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="m-row">
        <label class="m-lbl">カテゴリ名 <span style="color:#e03">*</span></label>
        <input class="m-input" id="sec-add-name" placeholder="例: 腎臓、眼科、法医学...">
      </div>
      <div class="m-actions">
        <button class="btn-cancel" onclick="closeModal('sec-add-modal')">キャンセル</button>
        <button class="btn-primary" onclick="saveSecAdd()">追加する</button>
      </div>
    </div>
  </div>
</div>

<!-- セクション編集モーダル -->
<div class="modal-wrap" id="sec-edit-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('sec-edit-modal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">カテゴリ名を変更</div>
        <button class="modal-close" onclick="closeModal('sec-edit-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="m-row">
        <label class="m-lbl">新しいカテゴリ名</label>
        <input class="m-input" id="sec-edit-name" placeholder="カテゴリ名">
      </div>
      <div class="m-actions">
        <button class="btn-cancel" onclick="closeModal('sec-edit-modal')">キャンセル</button>
        <button class="btn-primary" onclick="saveSecEdit()">保存する</button>
      </div>
    </div>
  </div>
</div>

<!-- ログイン / 新規登録モーダル -->
<div class="modal-wrap" id="login-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('login-modal')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="login-modal-title">管理者ログイン</div>
        <button class="modal-close" onclick="closeModal('login-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <!-- タブ -->
      <div style="display:flex;gap:2px;margin-bottom:1.25rem;background:#f0f0f0;padding:3px;border-radius:9px">
        <button id="auth-tab-login" onclick="switchLoginTab('login')"
          style="flex:1;padding:7px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#111">ログイン</button>
        <button id="auth-tab-register" onclick="switchLoginTab('register')"
          style="flex:1;padding:7px;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:#888">新規登録</button>
      </div>
      <div class="m-row">
        <label class="m-lbl">メールアドレス</label>
        <input class="m-input" id="login-email" type="email" placeholder="admin@example.com" autocomplete="email">
      </div>
      <div class="m-row">
        <label class="m-lbl">パスワード</label>
        <input class="m-input" id="login-password" type="password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
      </div>
      <div class="m-error" id="login-error"></div>
      <div class="m-actions">
        <button class="btn-cancel" onclick="closeModal('login-modal')">キャンセル</button>
        <button class="btn-primary" id="auth-submit-btn" onclick="doSubmitAuth()">ログイン</button>
      </div>
    </div>
  </div>
</div>

<!-- 画像管理モーダル -->
<div class="modal-wrap" id="img-modal">
  <div class="overlay" onclick="if(event.target===this)closeModal('img-modal')">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="img-modal-title">画像管理</div>
          <div class="img-count-sub" id="img-count"></div>
        </div>
        <button class="modal-close" onclick="closeModal('img-modal')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="img-current-list"></div>
      <div id="img-add-section">
        <div class="m-divider"></div>
        <div class="m-row">
          <label class="m-lbl">新しい画像を追加</label>
          <input class="m-input" id="img-file-input" type="file" accept="image/*">
        </div>
        <div class="m-row">
          <label class="m-lbl">キャプション（任意）</label>
          <input class="m-input" id="img-caption-input" placeholder="例: 組織像の模式図">
        </div>
        <div class="img-upload-progress" id="img-upload-progress"></div>
        <div class="m-actions">
          <button class="btn-cancel" onclick="closeModal('img-modal')">キャンセル</button>
          <button class="btn-primary" id="img-save-btn" onclick="saveImg()">追加する</button>
        </div>
      </div>
      <div id="img-max-reached" style="display:none">
        <div class="img-max-msg">最大5枚に達しています</div>
        <div class="m-actions">
          <button class="btn-cancel" onclick="closeModal('img-modal')">閉じる</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<!-- Firebase 設定（firebase-config.js を作成してください） -->
<script src="firebase-config.js" onerror="console.warn('firebase-config.js が見つかりません')"></script>
<!-- アプリケーションロジック -->
<script src="app.js?v=4"></script>
<button id="scroll-top-btn" aria-label="ページトップへ戻る" onclick="scrollToTop()">↑</button>
</body>
</html>
